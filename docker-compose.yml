version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: smde_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smde-service
    ports:
      - "5432:5432"
    volumes:
      - smde_pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

volumes:
  smde_pg_data: